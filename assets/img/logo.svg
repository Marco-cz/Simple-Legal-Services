<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Simple Legal Services logo">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D4A35"/>
      <stop offset="100%" stop-color="#1f3525"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M60 6 L106 20 L106 60 C106 86 86 106 60 114 C34 106 14 86 14 60 L14 20 Z"
        fill="url(#shield)" stroke="#E07B3F" stroke-width="2"/>

  <!-- Inner banner -->
  <rect x="22" y="74" width="76" height="18" rx="3" fill="#F5F0E8"/>
  <text x="60" y="87" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-weight="700" font-size="11" fill="#2D4A35" letter-spacing="1">
    SLS
  </text>

  <!-- Stylized lion silhouette -->
  <g fill="#E07B3F">
    <!-- Mane / head -->
    <circle cx="60" cy="42" r="18"/>
    <!-- Mane spikes -->
    <path d="M60 22 L56 14 L62 18 L66 12 L66 20 L72 16 L70 24 Z"/>
    <path d="M60 22 L64 14 L58 18 L54 12 L54 20 L48 16 L50 24 Z"/>
    <path d="M42 42 L34 38 L40 44 L32 46 L42 50 Z"/>
    <path d="M78 42 L86 38 L80 44 L88 46 L78 50 Z"/>
    <!-- Body -->
    <path d="M44 56 Q60 70 76 56 L76 70 Q60 74 44 70 Z"/>
  </g>

  <!-- Lion face details -->
  <g fill="#2D4A35">
    <circle cx="54" cy="40" r="2"/>
    <circle cx="66" cy="40" r="2"/>
    <path d="M56 48 Q60 52 64 48 Z"/>
  </g>

  <!-- Decorative diamond pattern (Gryffindor-inspired) -->
  <g fill="#9EC4A8" opacity="0.5">
    <path d="M30 28 L34 32 L30 36 L26 32 Z"/>
    <path d="M90 28 L94 32 L90 36 L86 32 Z"/>
  </g>
</svg>
